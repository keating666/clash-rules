name: Update All Rules

on:
  schedule:
    # 每天 UTC 06:00（北京时间 14:00）
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq dnsutils curl

      - name: Update Wise
        run: bash scripts/update-exchange.sh configs/Wise.json

      - name: Update Bybit
        run: bash scripts/update-exchange.sh configs/Bybit.json

      - name: Update Binance
        run: bash scripts/update-exchange.sh configs/Binance.json

      - name: Update OKX
        run: bash scripts/update-exchange.sh configs/OKX.json

      - name: Update MetaMask
        run: bash scripts/update-exchange.sh configs/MetaMask.json

      - name: Update Polymarket
        run: bash scripts/update-exchange.sh configs/Polymarket.json

      - name: Update Kalshi
        run: bash scripts/update-exchange.sh configs/Kalshi.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet rules/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          git commit -m "chore: update domain rules $(date -u '+%Y-%m-%d')"
          git push
